<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yiqi Chen | Light Preview</title>
    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/site.css">
    <link rel="stylesheet" href="https://use.typekit.net/nhh1bys.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #f6f1e8;
            color: #241b12;
        }

        menu,
        menu section {
            background-color: rgba(246, 241, 232, 0.92);
            color: #241b12;
            backdrop-filter: blur(10px);
        }

        menu {
            border-bottom: 1px solid rgba(36, 27, 18, 0.08);
        }

        #icon-container .nav-icon {
            --nav-stretch: 640px;
            display: block;
            width: 32px;
            height: 32px;
        }

        #icon-container .nav-icon svg {
            display: block;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        #icon-container .nav-icon .nav-shift-right,
        #icon-container .nav-icon .nav-shift-half {
            transform-box: fill-box;
        }

        main {
            width: min(1240px, calc(100% - 48px));
            margin-top: 80px !important;
            padding: 56px 0 80px;
        }

        .test-copy {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(28px, 5vw, 56px);
            line-height: 1.1;
        }

        .test-copy a {
            color: inherit;
            text-decoration: none;
        }

        .test-copy a:hover {
            color: #8b6b42;
        }

        @media (max-width: 650px) {
            main {
                width: calc(100% - 24px);
                padding: 32px 0 56px;
            }
        }
    </style>
</head>

<body>
    <menu>
        <section>
            <div id="icon-container">
                <a class="nav-icon" aria-label="Home">
                    <svg xmlns="http://www.w3.org/2000/svg" width="216" height="216" viewBox="0 0 216 216" fill="none"
                        aria-hidden="true">
                        <g class="nav-shift-half">
                            <path d="M108 36V54" stroke="currentColor" stroke-width="9" stroke-linecap="round" />
                            <path d="M108 93V117" stroke="currentColor" stroke-width="9" stroke-linecap="round" />
                            <path d="M129 72C129 83.598 119.598 93 108 93C96.402 93 87 83.598 87 72"
                                stroke="currentColor" stroke-width="9" stroke-linecap="round" />
                        </g>
                        <line class="nav-line-top" x1="28" y1="54" x2="188" y2="54" stroke="currentColor"
                            stroke-width="9" stroke-linecap="round" />
                        <line class="nav-line-bottom-a" x1="45" y1="135" x2="170.5" y2="135" stroke="currentColor"
                            stroke-width="9" stroke-linecap="round" />
                        <line class="nav-line-bottom-b" x1="45" y1="157.5" x2="170.5" y2="157.5" stroke="currentColor"
                            stroke-width="9" stroke-linecap="round" />
                        <path d="M45 112.5V180" stroke="currentColor" stroke-width="9" stroke-linecap="round" />
                        <g class="nav-shift-right">
                            <path d="M171 112.5V180" stroke="currentColor" stroke-width="9" stroke-linecap="round" />
                            <circle cx="171" cy="94.5" r="18" stroke="currentColor" stroke-width="9" />
                        </g>
                        <circle cx="45" cy="94.5" r="18" stroke="currentColor" stroke-width="9" />
                    </svg>
                </a>
            </div>
            <div id="tags"></div>
        </section>
    </menu>

    <main id="portfolio">
        <p class="test-copy">test1：横向拉宽</p>
        <p class="test-copy"><a href="./test2.html">test2：纵向拉长</a></p>
    </main>

    <script>
        (() => {
            const navIcon = document.querySelector("#icon-container .nav-icon");
            if (!navIcon) return;

            const svg = navIcon.querySelector("svg");
            const topLine = svg.querySelector(".nav-line-top");
            const bottomLineA = svg.querySelector(".nav-line-bottom-a");
            const bottomLineB = svg.querySelector(".nav-line-bottom-b");
            const halfGroup = svg.querySelector(".nav-shift-half");
            const rightGroup = svg.querySelector(".nav-shift-right");

            const state = {
                progress: 0,
                target: 0,
                rafId: 0
            };

            const topBase = parseFloat(topLine.getAttribute("x2"));
            const bottomBase = parseFloat(bottomLineA.getAttribute("x2"));

            const getStretch = () => {
                const value = getComputedStyle(navIcon).getPropertyValue("--nav-stretch");
                return Number.parseFloat(value) || 0;
            };

            const apply = () => {
                const delta = getStretch() * state.progress;
                topLine.setAttribute("x2", String(topBase + delta));
                bottomLineA.setAttribute("x2", String(bottomBase + delta));
                bottomLineB.setAttribute("x2", String(bottomBase + delta));
                halfGroup.style.transform = `translateX(${delta / 2}px)`;
                rightGroup.style.transform = `translateX(${delta}px)`;
            };

            const tick = () => {
                const diff = state.target - state.progress;
                if (Math.abs(diff) < 0.001) {
                    state.progress = state.target;
                    apply();
                    state.rafId = 0;
                    return;
                }

                state.progress += diff * 0.18;
                apply();
                state.rafId = window.requestAnimationFrame(tick);
            };

            const animateTo = (target) => {
                state.target = target;
                if (!state.rafId) {
                    state.rafId = window.requestAnimationFrame(tick);
                }
            };

            navIcon.addEventListener("pointerenter", () => animateTo(1));
            navIcon.addEventListener("pointerleave", () => animateTo(0));
            navIcon.addEventListener("focus", () => animateTo(1));
            navIcon.addEventListener("blur", () => animateTo(0));

            apply();
        })();
    </script>

</body>

</html>
